<title>{{ site.title }}</title>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />

<!-- Favicon -->
<link rel="icon" href="{{ site.baseurl }}/favicon.ico" sizes="48x48">
<link rel="icon" type="image/svg+xml" href="{{ site.baseurl }}/assets/favicon/favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="{{ site.baseurl }}/assets/favicon/favicon-32.png">
<link rel="icon" type="image/png" sizes="192x192" href="{{ site.baseurl }}/assets/favicon/favicon-192.png">
<link rel="apple-touch-icon" sizes="180x180" href="{{ site.baseurl }}/assets/favicon/apple-touch-icon.png">
<meta name="theme-color" content="#242629">

<!-- Load resources -->
<link rel="stylesheet" href="{{ site.baseurl }}/assets/css/main.min.css" />
<noscript><link rel="stylesheet" href="{{ site.baseurl }}/assets/css/noscript.min.css" /></noscript>
<link rel="stylesheet" href="{{ site.baseurl }}/assets/css/custom.min.css" />

<link rel="stylesheet" href="{{ site.baseurl }}/assets/css/fontawesome-all.min.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,300italic,400,400italic">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap">

{% if site.google_analytics %}
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id={{ site.google_analytics }}"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', '{{ site.google_analytics }}');
</script>
{% endif %}
